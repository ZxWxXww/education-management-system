server:
  port: ${EDU_SERVER_PORT:8080}

spring:
  application:
    name: edu-smart-manager
  datasource:
    url: ${EDU_DB_URL:jdbc:mysql://localhost:3306/edu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${EDU_DB_USER:root}
    password: ${EDU_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.edusmart.manager.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO

edu:
  security:
    jwt:
      secret: ${EDU_JWT_SECRET:CHANGE_ME}
      ttl-seconds: ${EDU_JWT_TTL_SECONDS:7200}
    cors:
      allowed-origins:
        - ${EDU_CORS_ORIGIN_1:http://localhost:5173}
        - ${EDU_CORS_ORIGIN_2:http://127.0.0.1:5173}
        - ${EDU_CORS_ORIGIN_3:http://localhost:5174}
        - ${EDU_CORS_ORIGIN_4:http://127.0.0.1:5174}
        - ${EDU_CORS_ORIGIN_5:http://localhost:5175}
        - ${EDU_CORS_ORIGIN_6:http://127.0.0.1:5175}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers: []
      allow-credentials: true
      max-age: 3600

